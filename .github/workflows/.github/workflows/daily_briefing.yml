name: 晨间简报 - Daily Briefing                                                                                                                                
                                                                                                                                                                 
  on:                                                                                                                                                            
    schedule:                                                                                                                                                    
      # 每天7:00 UTC+8 = 23:00 UTC                                                                                                                               
      - cron: '0 23 * * *'                                                                                                                                       
                                                                                                                                                                 
    # 允许手动触发                                                                                                                                               
    workflow_dispatch:                                                                                                                                           
                                                                                                                                                                 
  jobs:                                                                                                                                                          
    briefing:                                                                                                                                                    
      name: 生成晨间简报                                                                                                                                         
      runs-on: ubuntu-latest                                                                                                                                     
                                                                                                                                                                 
      steps:                                                                                                                                                     
        - name: Checkout代码                                                                                                                                     
          uses: actions/checkout@v4                                                                                                                              
                                                                                                                                                                 
        - name: 设置Python                                                                                                                                       
          uses: actions/setup-python@v5                                                                                                                          
          with:                                                                                                                                                  
            python-version: '3.11'                                                                                                                               
            cache: 'pip'                                                                                                                                         
                                                                                                                                                                 
        - name: 安装依赖                                                                                                                                         
          run: |                                                                                                                                                 
            pip install -r requirements.txt                                                                                                                      
                                                                                                                                                                 
        - name: 运行晨间简报Agent                                                                                                                                
          env:                                                                                                                                                   
            CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}                                                                                                        
          run: |                                                                                                                                                 
            python main.py                                                                                                                                       
                                                                                                                                                                 
        - name: 上传简报                                                                                                                                         
          uses: actions/upload-artifact@v4                                                                                                                       
          with:                                                                                                                                                  
            name: briefing-${{ github.run_number }}                                                                                                              
            path: data/briefings/                                                                                                                                
            retention-days: 30 
